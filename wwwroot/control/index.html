<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Instructor Control</title>
    <link rel="stylesheet" href="control.css">
</head>
<body>
    <!-- Create/Join Screen -->
    <div id="setupScreen" class="setup-screen">
        <div class="setup-box">
            <h1>Instructor Control</h1>
            <button id="createBtn" onclick="createSession()">Create New Session</button>
            <p class="divider">or join existing</p>
            <input type="text" id="joinCodeInput" maxlength="6" placeholder="Code" autocomplete="off">
            <button id="joinBtn" onclick="joinExisting()">Join Session</button>
            <p id="setupError" class="error"></p>
        </div>
    </div>

    <!-- Control Panel -->
    <div id="controlPanel" class="control-panel" style="display:none;">
        <div class="header">
            <h2>Session: <span id="sessionCodeDisplay">---</span></h2>
            <div class="header-actions">
                <p class="hint">Share this code with the student monitor</p>
                <div class="header-buttons">
                    <button class="pause-btn" onclick="togglePause()" id="pauseBtn">Pause</button>
                    <button class="copy-btn" onclick="copyMonitorURL()" id="copyBtn">Copy Monitor URL</button>
                </div>
            </div>
        </div>

        <div class="controls-scroll">
            <!-- Heart Rate -->
            <div class="control-group">
                <div class="control-header">
                    <label>Heart Rate</label>
                    <span class="control-value"><input type="text" class="control-input" id="hrInput" value="72" onchange="manualInput('hr')" onkeydown="if(event.key==='Enter')this.blur()"><span class="unit">bpm</span></span>
                </div>
                <div class="display-toggle" id="hrDisplayToggle">
                    <button class="dt-btn active" data-mode="on" onclick="setDisplay('hr','on')">On</button>
                    <button class="dt-btn" data-mode="min" onclick="setDisplay('hr','min')">Min</button>
                    <button class="dt-btn" data-mode="off" onclick="setDisplay('hr','off')">Off</button>
                </div>
                <input type="range" id="hrSlider" min="20" max="300" value="72"
                    oninput="updateSlider('hr')">
                <div class="dual-slider">
                    <label class="sub-label">Irregularity</label>
                    <input type="range" id="irregularitySlider" min="0" max="50" value="0"
                        oninput="updateSlider('irregularity')">
                    <span class="control-value" style="font-size:12px;"><input type="text" class="control-input" id="irregularityInput" value="0" style="width:3ch;" onchange="manualInput('irregularity')" onkeydown="if(event.key==='Enter')this.blur()"><span class="unit">%</span></span>
                </div>
                <div class="preset-row">
                    <button onclick="setHR(40)">Brady 40</button>
                    <button onclick="setHR(72)">Normal 72</button>
                    <button onclick="setHR(110)">Tachy 110</button>
                    <button onclick="setHR(150)">SVT 150</button>
                </div>
            </div>

            <!-- ECG Rhythm -->
            <div class="control-group">
                <div class="control-header">
                    <label>ECG Rhythm</label>
                    <span class="control-value" id="rhythmDisplay">NSR</span>
                </div>
                <div class="rhythm-grid">
                    <button class="rhythm-btn active" data-rhythm="nsr" onclick="setRhythm('nsr')">NSR</button>
                    <button class="rhythm-btn" data-rhythm="afib" onclick="setRhythm('afib')">A-Fib</button>
                    <button class="rhythm-btn danger" data-rhythm="vtach" onclick="setRhythm('vtach')">V-Tach</button>
                    <button class="rhythm-btn danger" data-rhythm="vfib" onclick="setRhythm('vfib')">V-Fib</button>
                    <button class="rhythm-btn danger" data-rhythm="asystole" onclick="setRhythm('asystole')">Asystole</button>
                </div>
            </div>

            <!-- SpO2 -->
            <div class="control-group">
                <div class="control-header">
                    <label>SpO2</label>
                    <span class="control-value"><input type="text" class="control-input" id="spo2Input" value="98" onchange="manualInput('spo2')" onkeydown="if(event.key==='Enter')this.blur()"><span class="unit">%</span></span>
                </div>
                <div class="display-toggle" id="spo2DisplayToggle">
                    <button class="dt-btn active" data-mode="on" onclick="setDisplay('spo2','on')">On</button>
                    <button class="dt-btn" data-mode="min" onclick="setDisplay('spo2','min')">Min</button>
                    <button class="dt-btn" data-mode="off" onclick="setDisplay('spo2','off')">Off</button>
                </div>
                <input type="range" id="spo2Slider" min="0" max="100" value="98"
                    oninput="updateSlider('spo2')">
                <div class="dual-slider">
                    <label class="sub-label">Irregularity</label>
                    <input type="range" id="spo2IrregularitySlider" min="0" max="10" value="0"
                        oninput="updateIrregularity('spo2Irregularity')">
                    <span class="control-value" style="font-size:12px;"><input type="text" class="control-input" id="spo2IrregularityInput" value="0" style="width:3ch;" onchange="manualIrregularity('spo2Irregularity')" onkeydown="if(event.key==='Enter')this.blur()"><span class="unit">%</span></span>
                </div>
                <div class="preset-row">
                    <button onclick="setSpO2(70)">Critical 70</button>
                    <button onclick="setSpO2(88)">Low 88</button>
                    <button onclick="setSpO2(94)">Borderline 94</button>
                    <button onclick="setSpO2(98)">Normal 98</button>
                </div>
            </div>

            <!-- Blood Pressure -->
            <div class="control-group">
                <div class="control-header">
                    <label>Blood Pressure</label>
                    <span class="control-value"><input type="text" class="control-input" id="bpInput" value="120/80" style="width:7ch;" onchange="manualInput('bp')" onkeydown="if(event.key==='Enter')this.blur()"></span>
                </div>
                <div class="display-toggle" id="abpDisplayToggle">
                    <button class="dt-btn active" data-mode="on" onclick="setDisplay('abp','on')">On</button>
                    <button class="dt-btn" data-mode="min" onclick="setDisplay('abp','min')">Min</button>
                    <button class="dt-btn" data-mode="off" onclick="setDisplay('abp','off')">Off</button>
                </div>
                <div class="dual-slider">
                    <label class="sub-label">Systolic</label>
                    <input type="range" id="sysSlider" min="0" max="250" value="120"
                        oninput="updateSlider('bp')">
                    <label class="sub-label">Diastolic</label>
                    <input type="range" id="diaSlider" min="0" max="150" value="80"
                        oninput="updateSlider('bp')">
                    <label class="sub-label">Irregularity</label>
                    <input type="range" id="bpIrregularitySlider" min="0" max="10" value="0"
                        oninput="updateIrregularity('bpIrregularity')">
                    <span class="control-value" style="font-size:12px;"><input type="text" class="control-input" id="bpIrregularityInput" value="0" style="width:3ch;" onchange="manualIrregularity('bpIrregularity')" onkeydown="if(event.key==='Enter')this.blur()"><span class="unit">%</span></span>
                </div>
                <div class="preset-row">
                    <button onclick="setBP(80,50)">Hypotension</button>
                    <button onclick="setBP(120,80)">Normal</button>
                    <button onclick="setBP(180,110)">Hypertension</button>
                    <button onclick="setBP(60,40)">Shock</button>
                </div>
            </div>

            <!-- CVP -->
            <div class="control-group">
                <div class="control-header">
                    <label>CVP</label>
                    <span class="control-value"><input type="text" class="control-input" id="cvpInput" value="5" onchange="manualInput('cvp')" onkeydown="if(event.key==='Enter')this.blur()"><span class="unit">mmHg</span></span>
                </div>
                <div class="display-toggle" id="cvpDisplayToggle">
                    <button class="dt-btn active" data-mode="on" onclick="setDisplay('cvp','on')">On</button>
                    <button class="dt-btn" data-mode="min" onclick="setDisplay('cvp','min')">Min</button>
                    <button class="dt-btn" data-mode="off" onclick="setDisplay('cvp','off')">Off</button>
                </div>
                <input type="range" id="cvpSlider" min="0" max="25" value="5"
                    oninput="updateSlider('cvp')">
                <div class="dual-slider">
                    <label class="sub-label">Irregularity</label>
                    <input type="range" id="cvpIrregularitySlider" min="0" max="10" value="0"
                        oninput="updateIrregularity('cvpIrregularity')">
                    <span class="control-value" style="font-size:12px;"><input type="text" class="control-input" id="cvpIrregularityInput" value="0" style="width:3ch;" onchange="manualIrregularity('cvpIrregularity')" onkeydown="if(event.key==='Enter')this.blur()"><span class="unit">%</span></span>
                </div>
                <div class="preset-row">
                    <button onclick="setCVP(2)">Low 2</button>
                    <button onclick="setCVP(5)">Normal 5</button>
                    <button onclick="setCVP(12)">High 12</button>
                    <button onclick="setCVP(20)">V.High 20</button>
                </div>
            </div>

            <!-- ICP -->
            <div class="control-group">
                <div class="control-header">
                    <label>ICP</label>
                    <span class="control-value"><input type="text" class="control-input" id="icpInput" value="10" onchange="manualInput('icp')" onkeydown="if(event.key==='Enter')this.blur()"><span class="unit">mmHg</span></span>
                </div>
                <div class="display-toggle" id="icpDisplayToggle">
                    <button class="dt-btn active" data-mode="on" onclick="setDisplay('icp','on')">On</button>
                    <button class="dt-btn" data-mode="min" onclick="setDisplay('icp','min')">Min</button>
                    <button class="dt-btn" data-mode="off" onclick="setDisplay('icp','off')">Off</button>
                </div>
                <input type="range" id="icpSlider" min="0" max="40" value="10"
                    oninput="updateSlider('icp')">
                <div class="preset-row">
                    <button onclick="setICP(10)">Normal 10</button>
                    <button onclick="setICP(22)">Raised 22</button>
                    <button onclick="setICP(30)">High 30</button>
                    <button onclick="setICP(40)">Critical 40</button>
                </div>
                <label class="sub-label">Waveform morphology</label>
                <div class="preset-row">
                    <button onclick="setIcpMorphology('a')">A Normal</button>
                    <button onclick="setIcpMorphology('b')">B</button>
                    <button onclick="setIcpMorphology('c')">C</button>
                    <button onclick="setIcpMorphology('d')">D Critical</button>
                </div>
                <div class="dual-slider">
                    <label class="sub-label">P1 percussion</label>
                    <input type="range" id="icpP1Slider" min="0" max="100" value="100"
                        oninput="updateSlider('icpP1')">
                    <label class="sub-label">P2 tidal</label>
                    <input type="range" id="icpP2Slider" min="0" max="100" value="65"
                        oninput="updateSlider('icpP2')">
                    <label class="sub-label">P3 dicrotic</label>
                    <input type="range" id="icpP3Slider" min="0" max="100" value="40"
                        oninput="updateSlider('icpP3')">
                    <label class="sub-label">Irregularity</label>
                    <input type="range" id="icpIrregularitySlider" min="0" max="10" value="0"
                        oninput="updateIrregularity('icpIrregularity')">
                    <span class="control-value" style="font-size:12px;"><input type="text" class="control-input" id="icpIrregularityInput" value="0" style="width:3ch;" onchange="manualIrregularity('icpIrregularity')" onkeydown="if(event.key==='Enter')this.blur()"><span class="unit">%</span></span>
                </div>
            </div>

            <!-- Respiratory Rate -->
            <div class="control-group">
                <div class="control-header">
                    <label>Respiratory Rate</label>
                    <span class="control-value"><input type="text" class="control-input" id="rrInput" value="16" onchange="manualInput('rr')" onkeydown="if(event.key==='Enter')this.blur()"><span class="unit">/min</span></span>
                </div>
                <div class="display-toggle" id="rrDisplayToggle">
                    <button class="dt-btn active" data-mode="on" onclick="setDisplay('rr','on')">On</button>
                    <button class="dt-btn" data-mode="min" onclick="setDisplay('rr','min')">Min</button>
                    <button class="dt-btn" data-mode="off" onclick="setDisplay('rr','off')">Off</button>
                </div>
                <input type="range" id="rrSlider" min="0" max="40" value="16"
                    oninput="updateSlider('rr')">
                <div class="dual-slider">
                    <label class="sub-label">Irregularity</label>
                    <input type="range" id="rrIrregularitySlider" min="0" max="10" value="0"
                        oninput="updateIrregularity('rrIrregularity')">
                    <span class="control-value" style="font-size:12px;"><input type="text" class="control-input" id="rrIrregularityInput" value="0" style="width:3ch;" onchange="manualIrregularity('rrIrregularity')" onkeydown="if(event.key==='Enter')this.blur()"><span class="unit">%</span></span>
                </div>
                <div class="preset-row">
                    <button onclick="setRR(0)">Apnea</button>
                    <button onclick="setRR(8)">Low 8</button>
                    <button onclick="setRR(16)">Normal 16</button>
                    <button onclick="setRR(32)">Tachypnea 32</button>
                </div>
            </div>

            <!-- EtCO2 -->
            <div class="control-group">
                <div class="control-header">
                    <label>EtCO2</label>
                    <span class="control-value"><input type="text" class="control-input" id="etco2Input" value="38" onchange="manualInput('etco2')" onkeydown="if(event.key==='Enter')this.blur()"><span class="unit">mmHg</span></span>
                </div>
                <input type="range" id="etco2Slider" min="0" max="80" value="38"
                    oninput="updateSlider('etco2')">
                <div class="dual-slider">
                    <label class="sub-label">Irregularity</label>
                    <input type="range" id="etco2IrregularitySlider" min="0" max="10" value="0"
                        oninput="updateIrregularity('etco2Irregularity')">
                    <span class="control-value" style="font-size:12px;"><input type="text" class="control-input" id="etco2IrregularityInput" value="0" style="width:3ch;" onchange="manualIrregularity('etco2Irregularity')" onkeydown="if(event.key==='Enter')this.blur()"><span class="unit">%</span></span>
                </div>
                <div class="preset-row">
                    <button onclick="setEtCO2(0)">None</button>
                    <button onclick="setEtCO2(20)">Low 20</button>
                    <button onclick="setEtCO2(38)">Normal 38</button>
                    <button onclick="setEtCO2(60)">High 60</button>
                </div>
            </div>

            <!-- Temperature -->
            <div class="control-group">
                <div class="control-header">
                    <label>Temperature</label>
                    <span class="control-value"><input type="text" class="control-input" id="tempInput" value="36.8" style="width:5ch;" onchange="manualInput('temp')" onkeydown="if(event.key==='Enter')this.blur()"><span class="unit">&deg;C</span></span>
                </div>
                <input type="range" id="tempSlider" min="330" max="420" value="368"
                    oninput="updateSlider('temp')">
                <div class="dual-slider">
                    <label class="sub-label">Irregularity</label>
                    <input type="range" id="tempIrregularitySlider" min="0" max="10" value="0"
                        oninput="updateIrregularity('tempIrregularity')">
                    <span class="control-value" style="font-size:12px;"><input type="text" class="control-input" id="tempIrregularityInput" value="0" style="width:3ch;" onchange="manualIrregularity('tempIrregularity')" onkeydown="if(event.key==='Enter')this.blur()"><span class="unit">%</span></span>
                </div>
                <div class="preset-row">
                    <button onclick="setTemp(34.0)">Hypothermia</button>
                    <button onclick="setTemp(36.8)">Normal</button>
                    <button onclick="setTemp(38.5)">Fever</button>
                    <button onclick="setTemp(40.5)">High Fever</button>
                </div>
            </div>

            <!-- Quick Scenarios -->
            <div class="control-group scenarios">
                <div class="control-header">
                    <label>Quick Scenarios</label>
                </div>
                <div class="scenario-grid">
                    <button class="scenario-btn" onclick="scenario('healthy')">Healthy Adult</button>
                    <button class="scenario-btn" onclick="scenario('sepsis')">Sepsis</button>
                    <button class="scenario-btn" onclick="scenario('mi')">Acute MI</button>
                    <button class="scenario-btn danger" onclick="scenario('cardiac_arrest')">Cardiac Arrest</button>
                    <button class="scenario-btn" onclick="scenario('respiratory_failure')">Resp Failure</button>
                    <button class="scenario-btn" onclick="scenario('hemorrhage')">Hemorrhage</button>
                    <button class="scenario-btn" onclick="scenario('anaphylaxis')">Anaphylaxis</button>
                    <button class="scenario-btn" onclick="scenario('pe')">Pulmonary Embolism</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <script src="control.js"></script>
</body>
</html>
